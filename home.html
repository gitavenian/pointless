<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pointless - Start Game</title>
  <link rel="stylesheet" href="css/home.css" />
</head>
<body>
  <main class="home-card">
    <form class="content" id="startForm">
      <h1>POINTLESS</h1>
      <p class="tagline">Find the rarest answers and score as close to zero as possible.</p>
      <div class="team-fields">
        <div class="fields-kicker">Enter Team Names</div>
        <label class="team-row">
          <span class="team-num" aria-hidden="true">1</span>
          <input id="teamName1" type="text" maxlength="20" autocomplete="off" placeholder="Team 1" aria-label="Team 1 name" />
        </label>
        <label class="team-row">
          <span class="team-num" aria-hidden="true">2</span>
          <input id="teamName2" type="text" maxlength="20" autocomplete="off" placeholder="Team 2" aria-label="Team 2 name" />
        </label>
        <label class="team-row">
          <span class="team-num" aria-hidden="true">3</span>
          <input id="teamName3" type="text" maxlength="20" autocomplete="off" placeholder="Team 3" aria-label="Team 3 name" />
        </label>
      </div>
      <button class="start-button" type="submit">Start The Game</button>
    </form>
  </main>

  <script src="js/config.js"></script>
  <script src="js/home.js"></script>
</body>
</html>
