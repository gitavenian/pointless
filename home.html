<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Pointless - Start Game</title>
  <style>
    :root {
      --navy: #121653;
      --pink: #ee3d91;
      --purple: #6d279d;
      --yellow: #fff13c;
      --white: #fff;
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body {
      width: 100%;
      min-height: 100%;
    }

    body {
      display: grid;
      place-items: center;
      overflow: hidden;
      padding: 24px;
      color: var(--white);
      font-family: Arial, Helvetica, sans-serif;
      background:
        radial-gradient(circle at 50% 42%, rgba(255, 186, 220, 0.48), transparent 27%),
        linear-gradient(135deg, var(--pink), var(--purple) 55%, #281267);
    }

    .home-card {
      position: relative;
      width: min(92vw, 820px);
      min-height: min(76vh, 520px);
      padding: clamp(38px, 7vw, 76px);
      overflow: hidden;
      border: 3px solid rgba(255, 255, 255, 0.82);
      border-radius: 34px;
      background: linear-gradient(150deg, rgba(28, 31, 104, 0.98), rgba(69, 30, 123, 0.96));
      box-shadow: 0 30px 80px rgba(20, 7, 61, 0.5), inset 0 0 28px rgba(255, 255, 255, 0.1);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      text-align: center;
    }

    .home-card::before {
      content: "";
      position: absolute;
      width: min(54%, 360px);
      aspect-ratio: 1;
      border: clamp(13px, 2vw, 20px) solid rgba(255, 255, 255, 0.13);
      border-radius: 50%;
    }

    .content {
      position: relative;
      z-index: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
    }

    h1 {
      color: var(--white);
      font-family: "Arial Black", Arial, Helvetica, sans-serif;
      font-size: clamp(3.5rem, 10vw, 7.5rem);
      line-height: 0.9;
      letter-spacing: -0.055em;
      text-shadow: 0 7px 0 #080a31;
    }

    p {
      max-width: 500px;
      margin: clamp(26px, 4vw, 38px) 0;
      color: rgba(255, 255, 255, 0.82);
      font-size: clamp(1rem, 2vw, 1.25rem);
      font-weight: 700;
      line-height: 1.5;
    }

    .start-button {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-width: min(78vw, 300px);
      padding: 0.95em 1.7em;
      border: 3px solid var(--white);
      border-radius: 999px;
      color: var(--navy);
      background: var(--yellow);
      font-family: "Arial Black", Arial, Helvetica, sans-serif;
      font-size: clamp(1rem, 2.2vw, 1.3rem);
      font-weight: 900;
      letter-spacing: 0.035em;
      text-decoration: none;
      text-transform: uppercase;
      box-shadow: 0 8px 0 #c6a900, 0 17px 30px rgba(0, 0, 0, 0.32);
      transition: transform 0.18s ease, filter 0.18s ease, box-shadow 0.18s ease;
    }

    .start-button:hover {
      transform: translateY(-4px);
      filter: brightness(1.06);
      box-shadow: 0 11px 0 #c6a900, 0 22px 36px rgba(0, 0, 0, 0.36);
    }

    .start-button:active {
      transform: translateY(4px);
      box-shadow: 0 3px 0 #c6a900, 0 9px 20px rgba(0, 0, 0, 0.28);
    }

    @media (max-height: 620px) {
      .home-card {
        min-height: 88vh;
      }

      p {
        margin-block: 20px;
      }
    }
  </style>
</head>
<body>
  <main class="home-card">
    <div class="content">
      <h1>POINTLESS</h1>
      <p>Find the rarest answers and score as close to zero as possible.</p>
      <a class="start-button" href="Pointless.html">Start The Game</a>
    </div>
  </main>
</body>
</html>
